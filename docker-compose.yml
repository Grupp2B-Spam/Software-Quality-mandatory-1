services:
  frontend:
      build: ./js_fake_info_frontend-main
      ports:
      - "3000:80"


  web:
    build: ./fake_info
    ports:
      - '8081:8080'
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_NAME: addresses
      DB_USER: root
      DB_PASSWORD: ''
    volumes:
      - ./:/var/www/html

  db:
    image: mariadb:11
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
      MYSQL_ROOT_PASSWORD: ''
    volumes:
      - db_data:/var/lib/mysql
      - ./db/addresses.sql:/docker-entrypoint-initdb.d/01-addresses.sql:ro

volumes:
  db_data:
